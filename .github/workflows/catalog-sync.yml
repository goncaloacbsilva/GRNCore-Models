name: Catalog Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run scrapper tests
        run: npm --workspace scrappers test

      - name: Run catalog sync
        run: npm --workspace scrappers run sync

      - name: Commit catalog changes
        run: |
          if git diff --quiet; then
            echo "No catalog changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog
          git commit -m "chore: sync model catalogs"
          git push

