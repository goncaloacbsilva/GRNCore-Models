name: Model Fetchers

on:
  push:
    paths:
      - 'packages/model-fetchers/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/model-fetchers.yml'
  pull_request:
    paths:
      - 'packages/model-fetchers/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/model-fetchers.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run model fetcher tests
        run: npm --workspace packages/model-fetchers test

      - name: Build model fetchers package
        run: npm --workspace packages/model-fetchers run build

      - name: Pack model fetchers module
        run: |
          mkdir -p artifacts/model-fetchers
          cd packages/model-fetchers
          npm pack --pack-destination ../../artifacts/model-fetchers

      - name: Upload model fetchers tarball
        uses: actions/upload-artifact@v4
        with:
          name: model-fetchers-tarball
          path: artifacts/model-fetchers/*.tgz
