name: Model Fetchers

on:
  push:
    paths:
      - 'packages/model-fetchers/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/model-fetchers.yml'
  pull_request:
    paths:
      - 'packages/model-fetchers/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/model-fetchers.yml'
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'push' || startsWith(github.event.head_commit.message, 'chore: release model-fetchers v') == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Bump model fetchers version
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        run: |
          npm version patch --workspace packages/model-fetchers --no-git-tag-version
          npm install --package-lock-only

      - name: Run model fetcher tests
        run: npm --workspace packages/model-fetchers test

      - name: Build model fetchers package
        run: npm --workspace packages/model-fetchers run build

      - name: Pack model fetchers module
        id: pack_model_fetchers
        run: |
          mkdir -p artifacts/model-fetchers
          cd packages/model-fetchers
          TARBALL_NAME=$(npm pack --pack-destination ../../artifacts/model-fetchers)
          echo "tarball_name=${TARBALL_NAME}" >> "$GITHUB_OUTPUT"

      - name: Resolve model fetchers version
        id: package_version
        run: |
          VERSION=$(node -p 'require("./packages/model-fetchers/package.json").version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload model fetchers tarball
        uses: actions/upload-artifact@v4
        with:
          name: model-fetchers-tarball
          path: artifacts/model-fetchers/*.tgz

      - name: Update README release URL
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        run: |
          perl -0pi -e 's|https://github.com/goncaloacbsilva/GRNCore-Models/releases/download/model-fetchers-v[^/]+/grn-core-model-fetchers-\S+\.tgz|$ENV{RELEASE_URL}|g' README.md
        env:
          RELEASE_URL: https://github.com/goncaloacbsilva/GRNCore-Models/releases/download/model-fetchers-v${{ steps.package_version.outputs.version }}/${{ steps.pack_model_fetchers.outputs.tarball_name }}

      - name: Commit release metadata
        id: release_commit
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        run: |
          if git diff --quiet README.md packages/model-fetchers/package.json package-lock.json; then
            echo "Release metadata already up to date"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md packages/model-fetchers/package.json package-lock.json
          git commit -m "chore: release model-fetchers v${{ steps.package_version.outputs.version }}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-fetchers-v${{ steps.package_version.outputs.version }}
          name: model-fetchers v${{ steps.package_version.outputs.version }}
          target_commitish: ${{ steps.release_commit.outputs.sha != '' && steps.release_commit.outputs.sha || github.sha }}
          generate_release_notes: true
          files: artifacts/model-fetchers/*.tgz
          overwrite_files: true
